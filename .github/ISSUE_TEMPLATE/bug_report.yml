name: Bug Report
description: Reportar un bug en GanaWeb
labels: ["bug", "status:needs-review"]

body:
  - type: markdown
    attributes:
      value: |
        ## 📋 Cómo funciona

        1. **Envía** este reporte → se etiqueta automáticamente como `status:needs-review`
        2. Un **mantenedor revisa** y agrega `status:approved` (o lo cierra como inválido/duplicado)
        3. **Solo entonces** se debe abrir un PR para corregirlo

        Los PRs que corrijan issues sin `status:approved` serán rechazados automáticamente.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checklist
      options:
        - label: Busqué en [issues existentes](https://github.com/lrodriguezn/ganaweb/issues) y esto no es un duplicado
          required: true
        - label: Entiendo que los PRs serán rechazados si el issue vinculado no tiene `status:approved`
          required: true

  - type: textarea
    id: description
    attributes:
      label: 📝 Descripción del Bug
      description: Descripción clara y concisa del bug.
      placeholder: Describe el bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🔄 Pasos para Reproducir
      description: Pasos para reproducir el comportamiento.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Comportamiento Esperado
      description: ¿Qué esperabas que ocurriera?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Comportamiento Actual
      description: ¿Qué ocurrió realmente?
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## 🖥️ Entorno

  - type: dropdown
    id: os
    attributes:
      label: Sistema Operativo
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Arch/Manjaro)
        - Linux (Fedora/RHEL)
        - Linux (Other)
        - Windows
        - Windows (WSL)
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Navegador
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Otro
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 📋 Área Afectada
      options:
        - Web App
        - API
        - Base de Datos
        - Autenticación
        - Reportes
        - UI/UX
        - Documentación
        - Infraestructura
        - Otro
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 💡 Logs / Mensajes de Error
      description: Pega cualquier log relevante. Se formateará como código.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Contexto Adicional
      description: Pantallazos, configuraciones, etc.
    validations:
      required: false
