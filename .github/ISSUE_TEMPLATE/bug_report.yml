name: Bug Report
description: Report something that is broken or behaving incorrectly in ganaweb.
title: "[Bug]: "
labels: ["bug", "status:needs-review"]
assignees: []
body:
  - type: markdown
    attributes:
      content: |
        Thanks for taking the time to file a bug report.
        Please fill out every section below — incomplete reports will be asked to revise before approval.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checks
      description: Please confirm both before continuing.
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true
        - label: I understand this issue needs the `status:approved` label from a maintainer before a PR can be opened.
          required: true

  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "The animal list fails to load when offline and I have more than 50 records synced."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Numbered steps that reliably reproduce the bug.
      placeholder: |
        1. Go to the main screen
        2. Toggle airplane mode on
        3. Open "Animals" with 50+ records
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include any error messages, stack traces, or screenshots.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: The OS on which the bug was reproduced.
      options:
        - macOS
        - Linux
        - Windows
        - Android
        - iOS
        - Other
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: The browser or webview in which the bug was reproduced.
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Samsung Internet
        - Other
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device Type
      description: The form factor where you saw the bug.
      options:
        - Desktop
        - Tablet
        - Mobile
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any console output, network responses, or server logs. Skip if not applicable.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: "Anything else that may help: PWA install state, sync state, offline/online, screenshots, links, workarounds."
    validations:
      required: false
