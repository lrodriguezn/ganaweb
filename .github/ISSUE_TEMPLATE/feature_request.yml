name: Feature Request
description: Sugerir una nueva funcionalidad o mejora para GanaWeb
labels: ["enhancement", "status:needs-review"]

body:
  - type: markdown
    attributes:
      value: |
        ## 📋 Cómo funciona

        1. **Envía** esta solicitud → se etiqueta automáticamente como `status:needs-review`
        2. Un **mantenedor revisa** y agrega `status:approved` (o la cierra como fuera-de-alcance/duplicado)
        3. **Solo entonces** se debe abrir un PR para implementarla

        Los PRs que implementen features sin `status:approved` en el issue vinculado serán rechazados automáticamente.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checklist
      options:
        - label: Busqué en [issues existentes](https://github.com/lrodriguezn/ganaweb/issues) y esto no es un duplicado
          required: true
        - label: Entiendo que los PRs serán rechazados si el issue vinculado no tiene `status:approved`
          required: true

  - type: dropdown
    id: area
    attributes:
      label: 🔍 Área Afectada
      description: ¿Qué área de GanaWeb afectaría esta feature?
      options:
        - Web App
        - API
        - Base de Datos
        - Autenticación
        - Reportes
        - UI/UX
        - Documentación
        - Infraestructura
        - Otro
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 💡 Planteamiento del Problema
      description: ¿Tu solicitud está relacionada con un problema? Descríbelo claramente.
      placeholder: |
        Me frustra que...
        Actualmente no es posible...
        Cada vez que necesito X, tengo que hacer manualmente...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 📦 Solución Propuesta
      description: Describe la solución que te gustaría. Sé lo más específico posible.
      placeholder: |
        Ejemplo de uso:
          ...

        Comportamiento esperado:
          ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternativas Consideradas
      description: Describe soluciones alternativas que hayas considerado.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 📎 Contexto Adicional
      description: Pantallazos, ejemplos, etc.
    validations:
      required: false
