name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint + Typecheck + Test + Build + Depcruise + Coverage + Health
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ganaweb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ganaweb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Node-types parity check
        run: pnpm parity:node-types

      - name: Biome CI
        run: pnpm exec biome ci .

      - name: Typecheck (turbo)
        run: pnpm turbo typecheck

      - name: Test (turbo, coverage solo para el gate)
        run: pnpm turbo test --filter='@ganaweb/dominio' && pnpm turbo test --filter='!@ganaweb/dominio'

      - name: DB smoke (postgres migrations + constraints)
        run: pnpm --filter @ganaweb/db migrate && pnpm --filter @ganaweb/db test:smoke

      - name: Build (turbo)
        run: pnpm turbo build

      - name: Dependency-cruise (layer rules + no-sqlite backstop)
        run: pnpm exec dependency-cruiser .

      - name: Coverage gate (dominio ≥ 90%)
        run: pnpm --filter @ganaweb/dominio exec vitest run --coverage && node scripts/check-coverage.mjs

      - name: No-SQLite guard (online-first gate)
        run: pnpm run no-sqlite

      - name: Health-check (owns migrate + seed + probe, postgres service)
        run: pnpm --filter @ganaweb/web health-check
        timeout-minutes: 10
        continue-on-error: true
